<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  padding:20px;
}
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
}
input, button {
  padding:10px;
  width:100%;
  margin:6px 0;
}
#searchResults div {
  padding:8px;
  cursor:pointer;
}
#searchResults div:hover {
  background:#eee;
}
</style>
</head>

<body>

<div class="card">
<h2>Macro Tracker</h2>

<input id="foodSearch" placeholder="Search food..." />
<div id="searchResults"></div>

<input type="number" id="servings" value="1" />

<button onclick="addFood()">Add Food</button>

<p id="preview"></p>
</div>

<script>
const foodDatabase = [
  {name:"Chicken Breast", cal:280, protein:53, carbs:0, fat:6},
  {name:"Rice", cal:205, protein:4, carbs:45, fat:0},
  {name:"Egg", cal:70, protein:6, carbs:0, fat:5},
  {name:"Oatmeal", cal:300, protein:10, carbs:54, fat:6},
  {name:"Banana", cal:105, protein:1, carbs:27, fat:0}
];

let selectedFood = null;

function searchFood(query){
  const results = document.getElementById("searchResults");
  results.innerHTML = "";

  if(!query) return;

  const matches = foodDatabase.filter(f =>
    f.name.toLowerCase().includes(query.toLowerCase())
  );

  matches.forEach(food => {
    const div = document.createElement("div");
    div.textContent = food.name;

    div.onclick = () => {
      selectedFood = food;
      document.getElementById("foodSearch").value = food.name;
      results.innerHTML = "";
      updatePreview();
    };

    results.appendChild(div);
  });
}

function updatePreview(){
  const servings = Number(document.getElementById("servings").value);

  if(!selectedFood) return;

  document.getElementById("preview").textContent =
    `${selectedFood.name} × ${servings} = ${selectedFood.cal * servings} cal`;
}

function addFood(){
  if(!selectedFood){
    alert("Select a food first");
    return;
  }
  alert("Food added!");
}

document.getElementById("foodSearch").addEventListener("input", (e)=>{
  selectedFood = null;
  searchFood(e.target.value);
});

document.getElementById("servings").addEventListener("input", updatePreview);
</script>

</body>
</html>
